<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>충주시청소년상담복지센터 — 검토용 시안 (비공개)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(900px 520px at 50% -10%,#F6EBE2 0%,rgba(246,235,226,0) 60%),linear-gradient(180deg,#FBF8F2,#F0EBE1);color:#2A2723;}
  .box{width:100%;max-width:380px;background:#fff;border:1px solid #E7E0D3;border-radius:22px;padding:40px 34px;
    box-shadow:0 24px 60px rgba(58,45,40,.14);text-align:center;}
  .lock{width:62px;height:62px;border-radius:50%;background:#F4E3D6;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;}
  .lock svg{width:30px;height:30px;color:#A8552A;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:3px;color:#C56A38;}
  h1{font-family:'Noto Serif KR',serif;font-size:23px;font-weight:700;letter-spacing:-.5px;margin-top:10px;color:#3A352E;}
  p.sub{margin-top:10px;font-size:14px;color:#8C8475;line-height:1.6;}
  form{margin-top:24px;}
  input{width:100%;padding:14px 16px;font-size:16px;border:1.5px solid #DCD4C7;border-radius:12px;text-align:center;outline:none;transition:border-color .2s;background:#FBF8F2;}
  input:focus{border-color:#C56A38;}
  button{margin-top:12px;width:100%;padding:14px;font-size:16px;font-weight:700;color:#fff;background:#C56A38;border:0;border-radius:12px;cursor:pointer;transition:background .2s;font-family:inherit;}
  button:hover{background:#A8552A;}
  .err{margin-top:14px;font-size:13.5px;color:#C0392B;min-height:18px;font-weight:600;}
  .note{margin-top:18px;font-size:12px;color:#A89F92;}
</style>
</head>
<body>
  <div class="box">
    <div class="lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
    <div class="eyebrow">충주시청소년상담복지센터</div>
    <h1>검토용 비공개 시안</h1>
    <p class="sub">담당자에게 받은 비밀번호를 입력하면<br>디자인 시안을 볼 수 있어요.</p>
    <form id="f" onsubmit="return go(event)">
      <input id="pw" type="password" placeholder="비밀번호" autocomplete="off" autofocus>
      <button type="submit">열기</button>
      <div class="err" id="err"></div>
    </form>
    <div class="note">🔒 비밀번호를 아는 사람만 열람할 수 있습니다.</div>
  </div>
<script>
const DATA={"salt":"gd1zyL4wFKSCyVe/y9JJFQ==","iv":"kUjn/WE32+WDgA0V","ct":"NZiqTtPt/rFTH8iDVLZnX69fEbA7lc4P0rS0XGY6nCNsYpTNcz0Va2fntIpA2S+8ENeJdL/zzj+33ysWfS7YC/zunJC/U6HXWFeyr2rDZv58h3KOUIrCHrQ5rZjeXQf94kOFEHlPCbg6N+aACn680lxh1ujqcS1horVdgQqdU9IHpQVfyRla/IIkmM2lMhDFLt+2NW0+gi71y8FjJ8P0OFtYoO+d5zk2B7hvanXyUaLccdn3ZIxuuh/r9soS6b5MqA0TFD9EvWAokn8XY+aFuazVJI+vr/BK9nHRy9XkGuVa8mKybT0UnmvDlw97jpi/sbllNycfyVeoOqb5EZpShqqGhL20DE09oZmTM+wCrbf/uKlAABAPQ0PAx6fRCy25q1tFSolgW3iXATDD9m1cUqaJq540GfDx8DDa1wRQfIwSIe8+1m0VwoFck/iwCisQeZJW95M=","iter":200000};
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(DATA.salt),iterations:DATA.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(DATA.iv)},key,b64(DATA.ct));
  return new TextDecoder().decode(pt);
}
function reveal(html){document.open();document.write(html);document.close();}
async function go(e){e.preventDefault();const pw=document.getElementById('pw').value;
  try{const html=await dec(pw);sessionStorage.setItem('cjpw',pw);reveal(html);}
  catch(_){document.getElementById('err').textContent='비밀번호가 올바르지 않습니다.';document.getElementById('pw').value='';}
  return false;}
(async()=>{const s=sessionStorage.getItem('cjpw');if(s){try{reveal(await dec(s));}catch(_){sessionStorage.removeItem('cjpw');}}})();
</script>
</body>
</html>
