const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(DATA.salt),iterations:DATA.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(DATA.iv)},key,b64(DATA.ct));
  return new TextDecoder().decode(pt);
}
function reveal(html){document.open();document.write(html);document.close();}
async function go(e){e.preventDefault();const pw=document.getElementById('pw').value;
  try{const html=await dec(pw);sessionStorage.setItem('cjpw',pw);reveal(html);}
  catch(_){document.getElementById('err').textContent='비밀번호가 올바르지 않습니다.';document.getElementById('pw').value='';}
  return false;}
(async()=>{const s=sessionStorage.getItem('cjpw');if(s){try{reveal(await dec(s));}catch(_){sessionStorage.removeItem('cjpw');}}})();
</script>
